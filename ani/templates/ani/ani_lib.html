{% extends "ani/navbar.html" %}

{% block title %}動畫庫 | ANiLib{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-end mb-4 px-2 container">
    <div class="mt-4">
        <h2 class="fw-bold mb-0">全部收藏</h2>
        <p class="text-muted mb-0">探索資料庫中的所有作品</p>
    </div>
    <div class="dropdown">
        <button class="btn btn-outline-secondary dropdown-toggle rounded-pill" type="button" data-bs-toggle="dropdown">
            排序方式
        </button>
        <ul class="dropdown-menu shadow border-0">
            <li><a class="dropdown-item" href="?sort=year">按年份</a></li>
            <li><a class="dropdown-item" href="?sort=rating">按評分</a></li>
        </ul>
    </div>
</div>

<div class="container mb-5">
    <div class="row row-cols-2 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-4" id="ani-grid">
        
        {% if not page_obj %}
            <div class="col-12 text-center py-5">
                <i class="bi bi-inbox text-muted display-1"></i>
                <p class="text-muted mt-3">目前沒有找到任何動畫資料......</p>
            </div>
        {% else %}
            {% include "ani/partials/ani_items.html" %}
        {% endif %}
        
    </div>
    
    <div class="text-center py-4 htmx-indicator" id="loading-spinner" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/htmx.org@1.9.10"></script>

<style>
    .hover-shadow {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .hover-shadow:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important;
    }

    .object-fit-cover {
        object-fit: cover;
    }
    
    /* Htmx 指示器的樣式 */
    .htmx-request#loading-spinner {
        display: block !important;
    }
</style>
{% endblock %}
