{% for ani in page_obj %}
    <div class="col" 
         {% if forloop.last and page_obj.has_next %}
             hx-get="?page={{ page_obj.next_page_number }}{% if request.GET.sort %}&sort={{ request.GET.sort }}{% endif %}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}"
             hx-trigger="revealed"
             hx-swap="afterend"
         {% endif %}>
         
        <a href="{% url 'ani_detail' ani.pk %}" class="text-decoration-none text-reset">
            <div class="card h-100 border-0 shadow-sm hover-shadow transition rounded-3 overflow-hidden bg-body">
                <div class="position-relative" style="height: 280px;">
                    {% if ani.poster %}
                        <img src="{{ ani.poster.url }}" class="w-100 h-100 object-fit-cover" loading="lazy" alt="{{ ani.title }}">
                    {% else %}
                        <div class="bg-secondary w-100 h-100 d-flex align-items-center justify-content-center text-white-50">
                            <i class="bi bi-image" style="font-size: 2rem;"></i>
                        </div>
                    {% endif %}
                    
                    {% if ani.imdb_stars %}
                    <div class="position-absolute top-0 end-0 m-2">
                        <span class="badge bg-dark bg-opacity-75 text-warning fw-bold">★ {{ ani.imdb_stars }}</span>
                    </div>
                    {% endif %}
                </div>
                
                <div class="card-body p-3">
                    <h6 class="card-title text-truncate mb-1 fw-bold text-body" title="{{ ani.title }}">{{ ani.title }}</h6>
                    <p class="card-text small text-muted mb-2">{{ ani.year }} · <span class="badge status-badge" data-status="{{ ani.status }}">{{ ani.get_status_display }}</span></p>
                    
                    <div class="d-flex flex-wrap gap-1 mt-2">
                        {% for tag in ani.tags.all|slice:":2" %}
                        <span class="badge rounded-pill bg-secondary bg-opacity-10 text-secondary border-0 small" style="font-size: 0.7rem;">{{ tag.name }}</span>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </a>
    </div>
{% endfor %}
