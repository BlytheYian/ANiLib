<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ANiLib{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 簡單的自定義黑暗模式 */
        [data-bs-theme="dark"] { background-color: #121212; }
        .navbar-brand { font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body data-bs-theme="light"> <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'ani_index' %}">ANiLib</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <form class="d-flex mx-auto w-50" action="/search/" method="get">
                    <input class="form-control me-2 rounded-pill" type="search" name="q" placeholder="搜尋動畫、創作者..." aria-label="Search">
                </form>

                <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle ms-2" type="button" title="切換深色/淺色模式">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        btn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-bs-theme', newTheme);
        });
    </script>
</body>
</html>
