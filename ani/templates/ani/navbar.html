<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ANiLib{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        [data-bs-theme="dark"] { 
            --bs-body-bg: #121212; 
        }
        [data-bs-theme="dark"] .hover-shadow:hover {
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15) !important;
        }
        .navbar-brand { font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body data-bs-theme="light">
    <nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body-tertiary">
        <div class="container align-items-center">
            
            <a class="navbar-brand fw-bold me-2" href="{% url 'ani_index' %}">ANiLib</a>

            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link fw-bold px-lg-3" href="{% url 'ani_lib' %}">動畫庫</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center flex-grow-1 flex-lg-grow-0 ms-auto">
                
                <form class="flex-grow-1 me-2 mb-0" action="{% url 'ani_search' %}" method="get">
                    <input class="form-control rounded-pill" type="search" name="q" placeholder="搜尋..." autocomplete="off" aria-label="Search">
                </form>

                <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 38px; height: 38px;" type="button">
                    <i id="theme-icon" class="bi bi-sun-fill"></i>
                </button>

                <button class="navbar-toggler p-1 border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon" style="width: 1.1rem; height: 1.1rem;"></span>
                </button>

            </div>

        </div>
    </nav>
    <style>
        .nav-link {
            transition: transform 0.2s ease, color 0.2s ease !important; // 平滑過渡
            display: inline-block;
        }
        .nav-link:hover {
            transform: scale(1.1);
            color: #7caac5 !important;
        }
        #theme-toggle:hover {
            background-color: #7caac5 !important;
        }

        /*
        .status-badge[data-status="ONGOING"] { @extend .bg-success; background-color: #4cce91;}
        .status-badge[data-status="FINISHED"] { @extend .bg-primary; background-color: rgb(113, 164, 241); }
        .status-badge[data-status="CANCELLED"] { @extend .bg-danger; background-color: #ff6d7c; }
        .status-badge[data-status="UPCOMING"] { background-color: #bd84ef; }
        .status-badge[data-status="CROWDFUNDING"] { background-color: #ffcc00; }*/
        .status-badge[data-status="ONGOING"] { 
            border-color: #4cce91;
            color: #4cce91;
        }
        .status-badge[data-status="FINISHED"] { 
            border-color:  rgb(118, 177, 236);
            color:  rgb(118, 177, 236);
        }
        .status-badge[data-status="CANCELLED"] { 
            border-color: #ff6d7c;
            color:  #ff6d7c;
        }
        .status-badge[data-status="UPCOMING"] { 
            border-color:  #e7b900;
            color:  #e7b900;
        }
        .status-badge[data-status="CROWDFUNDING"] { 
            border-color:  #bd84ef;
            color:  #bd84ef;
        }
        .status-badge { 
            border: 2px solid;
            border-color: #a0adb9;
            font-weight: 600;
            color: #a0adb9;
            padding: 0.35em 0.65em;
        }
    </style>

    <!--<div class="container mt-4">-->
    {% block content %}{% endblock %}
    <!--</div>-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        btn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-bs-theme', newTheme);
        });
        document.addEventListener('DOMContentLoaded', () => {
        // 1. 抓取我們需要操作的元素
        // Bootstrap 5.3 官方建議把 data-bs-theme 放在 <html> 標籤上效果最好
        const htmlElement = document.documentElement; 
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        // 2. 檢查 LocalStorage 是否有之前存過的設定（預設給 'light'）
        const savedTheme = localStorage.getItem('site_theme') || 'light';
        
        // 3. 網頁一載入，馬上套用存好的設定
        applyTheme(savedTheme);

        // 4. 當使用者點擊按鈕時發生的事
        themeToggleBtn.addEventListener('click', () => {
            // 看看現在是什麼模式
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            // 如果是淺色就換深色，反之亦然
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            // 套用新主題並存檔
            applyTheme(newTheme);
        });

        function applyTheme(theme) {
            htmlElement.setAttribute('data-bs-theme', theme);
            
            localStorage.setItem('site_theme', theme);
            
            themeIcon.className = theme === 'light' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
            
            document.body.setAttribute('data-bs-theme', theme);
        }
    });
    </script>
</body>
</html>
