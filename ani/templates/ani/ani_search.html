{% extends "ani/navbar.html" %}

{% block title %}搜尋結果 - {{ query }} | ANiLib{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-end mb-4 px-2 container">
    <div class="mt-4">
        <h2 class="fw-bold mb-0">搜尋結果</h2>
        <p class="text-muted mb-0">
            找到 {{ count }} 部關於「<span class="fw-bold" style="color: #70aacf; !important">{{ query }}</span>」的作品
        </p>
    </div>
</div>

<div class="container mb-5">
    <div class="d-flex mb-4 px-2">
        <form method="GET" action="{% url 'ani_search' %}" class="w-100 d-flex position-relative">
            <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="left: 15px;"></i>
            <input type="search" name="q" value="{{ query }}" 
                   class="form-control rounded-pill ps-5 py-2 shadow-sm border-0 bg-body-tertiary" autocomplete="off" 
                   placeholder="重新搜尋動畫名稱、年份...">
        </form>
    </div>

    <div class="row row-cols-2 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-4">
    
    {% if page_obj %}
        {% include "ani/partials/ani_items.html" %}
    {% else %}
        <div class="col-12 w-100 text-center py-5 my-5">
            <i class="bi bi-search text-muted display-1"></i>
            <p class="text-muted mt-3">找不到符合「{{ query }}」的動畫資料......</p>
            <a href="{% url 'ani_lib' %}" class="btn btn-outline-secondary mt-2 rounded-pill">返回總動畫庫</a>
        </div>
    {% endif %}
    
</div>
    </div>
</div>

<style>
    .hover-shadow {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .hover-shadow:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important;
    }
    [data-bs-theme="dark"] .hover-shadow:hover {
        box-shadow: 0 15px 30px rgba(255, 255, 255, 0.1) !important;
    }
    .object-fit-cover {
        object-fit: cover;
    }
</style>

{% endblock %}
